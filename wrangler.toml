# homurabi Cloudflare Worker definition.
# Real Ruby + Rack + Sinatra on Cloudflare Workers via Opal.

name = "homurabi"
main = "src/worker.mjs"
compatibility_date = "2026-04-15"
compatibility_flags = ["nodejs_compat"]

# Phase 3: D1 / KV / R2 bindings reachable from Sinatra routes via
# `env['cloudflare.env'].DB` / `.KV` / `.BUCKET`.

[[d1_databases]]
binding = "DB"
database_name = "homurabi-db"
database_id = "3a59c955-198e-478f-8f11-71d5f3eb7600"

[[kv_namespaces]]
binding = "KV"
id = "64ee32f1c6c64f85af9591e827da7462"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "homurabi-bucket"

# Phase 10: Workers AI binding. Routes reach this from Ruby as
# `env['cloudflare.AI']` and pass it to `Cloudflare::AI.run(model, …)`.
# The binding name "AI" matches the Cloudflare convention; the runtime
# implements env.AI.run(model, inputs, options) automatically once
# wrangler dev / deploy attaches the AI gateway. No account-side
# configuration is required for `wrangler dev` (it proxies to the live
# Workers AI catalog) once `wrangler login` has run.
[ai]
binding = "AI"

# Phase 7: gating for the educational crypto routes (`/test/crypto`,
# `/demo/crypto`). Default OFF — those routes generate fresh RSA keys
# and run PBKDF2 per request, so leaving them open in production is a
# CPU-DoS vector. Set to "1" only in dev or behind a private route.
#
# Phase 10: same default-deny pattern for the AI demo (`/chat`,
# `/api/chat/*`, `/test/ai`). Workers AI is metered; leaving the chat
# endpoints publicly reachable in production lets anyone burn the
# account's neuron quota. Default OFF in the committed config so a
# casual `wrangler deploy` cannot accidentally expose the metered
# routes — flip to "1" only in a private dev environment (e.g.
# `wrangler dev --var HOMURABI_ENABLE_AI_DEMOS:1`) or with a per-env
# section.
[vars]
HOMURABI_ENABLE_CRYPTO_DEMOS = "0"
HOMURABI_ENABLE_AI_DEMOS = "0"
# Phase 9: gating for the educational scheduled-introspection routes
# (`/test/scheduled`, `/test/scheduled/run`). Default OFF — the run
# endpoint manually fires every registered cron handler and could
# write to D1 / KV from any unauthenticated caller in production.
# Set to "1" only in dev or behind a private route.
HOMURABI_ENABLE_SCHEDULED_DEMOS = "0"

# Phase 9 — Cloudflare Workers Cron Triggers.
#
# Each entry below produces one `scheduled(event, env, ctx)` firing
# per match. `event.cron` will literally be the string declared here,
# so the Ruby `schedule '*/5 * * * *' do ... end` blocks match by
# exact-string equality.
#
# The schedules below mirror the demo `schedule` blocks in
# `app/hello.rb`. Edit / extend in tandem when adding new jobs.
#
# Production safety: the demo schedule *bodies* in app/hello.rb
# short-circuit to a no-op unless `HOMURABI_ENABLE_SCHEDULED_DEMOS`
# is set to "1" (default-deny via the `[vars]` block above). Cron
# firings still happen on every deploy — they just don't write to
# D1 / KV unless the gate is open. To stop the firings entirely in
# production, comment out / remove the `crons` entries below.
#
# To trigger manually in local dev:
#   npx wrangler dev --test-scheduled
#   curl 'http://127.0.0.1:8787/__scheduled?cron=*/5+*+*+*+*'
[triggers]
crons = [
  "*/5 * * * *",   # heartbeat — writes a row to D1 every 5 minutes (gated)
  "0 */1 * * *",   # hourly housekeeping — KV counter demo (gated)
]
